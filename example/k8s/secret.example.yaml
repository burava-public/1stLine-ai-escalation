apiVersion: v1
kind: Secret
metadata:
  name: ai-escalation-controller-secrets
  namespace: ai-escalation
  labels:
    app: ai-escalation-controller
type: Opaque
stringData:
  FIRSTLINE_AI_ESCALATION_CONTROLLER_TOKEN: "replace-with-controller-token"
  FIRSTLINE_API_TOKEN: "replace-with-firstline-api-token"
  FIRSTLINE_ORG_CONTEXT: "replace-with-org-uid-or-slug"
  FIRSTLINE_MCP_URL: "https://1stline.burava.com/mcp"
  OPENCODE_MODEL: "replace-with-provider-model"
  OPENCODE_SMALL_MODEL: "replace-with-provider-small-model"
